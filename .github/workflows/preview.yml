name: Preview Deploy

on:
  push:
    branches-ignore:
      - master

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy preview Worker
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env preview

      - name: Set preview config
        run: |
          cat > docs/config.js << 'EOF'
          var API_URL = 'https://adkanri-api-preview.adkanri.workers.dev';
          var GOOGLE_CLIENT_ID = '${{ secrets.GOOGLE_CLIENT_ID }}';
          EOF

      - name: Deploy preview frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          npx wrangler pages deploy docs/ \
            --project-name=adkanri-task \
            --branch="$BRANCH_NAME" \
            --commit-hash="$GITHUB_SHA"
