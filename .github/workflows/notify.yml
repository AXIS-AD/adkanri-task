name: Update Notification

on:
  push:
    branches:
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Send update notification
        env:
          DEPLOY_NOTIFY_KEY: ${{ secrets.DEPLOY_NOTIFY_KEY }}
        run: |
          COMMITS=$(git log --oneline -5 --pretty=format:"・%s")
          TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y/%m/%d %H:%M')
          export CW_MSG="[info][title]update ${TIMESTAMP}[/title]${COMMITS}[/info]"

          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error

          msg = os.environ.get("CW_MSG", "")
          key = os.environ.get("DEPLOY_NOTIFY_KEY", "")

          print(f"msg length: {len(msg)}")
          print(f"key length: {len(key)}")

          payload = json.dumps({"key": key, "message": msg}).encode("utf-8")
          print(f"payload: {payload[:200]}")

          req = urllib.request.Request(
              "https://adkanri-api.adkanri.workers.dev/api/deploy-notify",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              resp = urllib.request.urlopen(req)
              print("OK:", resp.read().decode())
          except urllib.error.HTTPError as e:
              print(f"HTTP Error: {e.code}")
              print(f"Response body: {e.read().decode()}")
              raise
          PYEOF
