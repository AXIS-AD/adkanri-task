name: Update Notification

on:
  push:
    branches:
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Send update notification
        env:
          DEPLOY_NOTIFY_KEY: ${{ secrets.DEPLOY_NOTIFY_KEY }}
        run: |
          COMMITS=$(git log --oneline -5 --pretty=format:"・%s")
          TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y/%m/%d %H:%M')
          
          export CW_MSG="[info][title]🔄 アド管理ツール アップデート ${TIMESTAMP}[/title]${COMMITS}[/info]"
          
          python3 -c "
          import json, os, urllib.request
          msg = os.environ['CW_MSG']
          key = os.environ['DEPLOY_NOTIFY_KEY']
          data = json.dumps({'key': key, 'message': msg}).encode()
          req = urllib.request.Request(
              'https://adkanri-api.adkanri.workers.dev/api/deploy-notify',
              data=data,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          resp = urllib.request.urlopen(req)
          print(resp.read().decode())
          "
