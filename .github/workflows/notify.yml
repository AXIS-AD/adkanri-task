name: デイリーアップデート通知

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: 本日の変更を確認して通知
        env:
          DEPLOY_NOTIFY_KEY: ${{ secrets.DEPLOY_NOTIFY_KEY }}
        run: |
          TODAY=$(TZ=Asia/Tokyo date '+%Y-%m-%d')
          COMMITS=$(git log --oneline --after="${TODAY}T00:00:00+09:00" --pretty=format:"%s" | \
            grep -P '[^\x00-\x7F]' | \
            sed 's/^[a-z]*: //' | \
            sed 's/^/・/')

          if [ -z "$COMMITS" ]; then
            echo "本日の変更なし。通知スキップ。"
            exit 0
          fi

          TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y/%m/%d')
          export CW_MSG="[To:5420288]西村さん
          [To:9797164]筒井さん
          [To:10034061]友利さん
          [To:10696465]石田さん
          [info][title]🔄 アド管理ツール 本日のアップデート（${TIMESTAMP}）[/title]${COMMITS}[/info]"

          python3 << 'PYEOF'
          import json, os, urllib.request

          msg = os.environ.get("CW_MSG", "")
          key = os.environ.get("DEPLOY_NOTIFY_KEY", "")

          payload = json.dumps({"key": key, "message": msg}).encode("utf-8")
          req = urllib.request.Request(
              "https://adkanri-api.adkanri.workers.dev/api/deploy-notify",
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "adkanri-deploy-notify/1.0",
              },
              method="POST",
          )
          resp = urllib.request.urlopen(req)
          print("OK:", resp.read().decode())
          PYEOF
